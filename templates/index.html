<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Konekxion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css')}}">
</head>
<body>

<!-- Página de login principal con carrusel informativo y panel de acceso. -->
<div class="container">

  <!-- LEFT: CAROUSEL -->
  <div class="carousel-side">

    <!-- Vibrating phone icon badge -->
    <div class="icon-badge">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 1H7a2 2 0 0 0-2 2v18a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2zm-5 20a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zM17 16H7V4h10v12z"/>
      </svg>
    </div>

        <!-- Slides -->
    <div class="slides-track">
      <!-- Slide 1 -->
      <div class="slide">
        <img src="static/images/pelea.png" alt=pelea>
      </div>
      <!-- Slide 2 -->
      <div class="slide">
        <img src="static/images/conversacion.png">
      </div>
      <!-- Slide 3 -->
      <div class="slide">
        <img src="static/images/drb.png">
      </div>
      <!-- Slide 4 -->
      <div class="slide">
        <img src="static/images/saludo.png">
      </div>
    </div>
        <!-- Carousel bar -->
    <div class="carousel-bar">
      <span class="carousel-label">Conoce Konekxion</span>
      <div class="dots">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
        <div class="dot dot-4"></div>
      </div>
    </div>

  </div>

  <!-- RIGHT: LOGIN -->
  <div class="login-side">
    <div class="pulse-circle"></div>

      <!-- Nombre de la marca -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M17 1H7a2 2 0 0 0-2 2v18a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2zm-5 20a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zM17 16H7V4h10v12z"/></svg>
      </div>
      <span class="brand-name">KONEK<span>X</span>ION</span>
    </div>

    <h1 class="welcome-heading">Bienvenido<br>de vuelta</h1>
    <p class="welcome-sub">Inicia sesión para continuar. <strong>Chismea con tus amigos sin miedo aca</strong></p>

    <div class="field">
      <label for="email">Credencial</label>
      <div class="input-wrap">
        <input id="email" type="text" placeholder="" >
        <svg viewBox="0 0 24 24" style="pointer-events:none;position:absolute;left:16px;top:50%;transform:translateY(-50%)">
          <rect x="2" y="4" width="20" height="16" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 7l10 7 10-7" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
        <!-- Campo de contraseña -->
    <div class="field field-pw">
      <label for="password">Clave</label>
      <div class="input-wrap">
        <input id="password" type="password" placeholder="" autocomplete="current-password">
        <svg viewBox="0 0 18 18" style="pointer-events:none;position:absolute;left:10px;top:50%;transform:translateY(-50%)">
          <rect x="2" y="11" width="10" height="10" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke-linecap="round"/>
        </svg>
        <button class="toggle-pw" type="button" aria-label="Mostrar contraseña">
          <svg id="eye-icon" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
        <!-- Opciones de campo -->
    <div class="field-options">
      <label class="remember">
        <input type="checkbox" id="remember">
        <span class="checkmark"></span>
        Recordarme
      </label>
      <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
    </div>

    <button class="btn-login" type="button">Iniciar Sesión</button>

    <div class="divider"><span>o continúa con</span></div>

    <div class="social-row">
      <button class="btn-social" type="button">
        <!-- Google icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="btn-social" type="button">
        <!-- Apple icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.37.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.39-1.32 2.76-2.53 3.99zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
        Apple
      </button>
    </div>

    <p class="register-line">¿No tienes cuenta? <a href="#">Regístrate gratis</a></p>

  </div>
</div>
<script src="{{ url_for('static', filename='js/js.js') }}"></script>
</body>
</html>
